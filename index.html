<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Guardia Digital - Seguridad comunitaria con multimedia">
    <meta name="theme-color" content="#1e3a5f">
    
    <!-- Open Graph -->
    <meta property="og:title" content="🛡️ Guardia Digital - Seguridad del Barrio">
    <meta property="og:description" content="Reporta incidentes con fotos, videos y audio">
    <meta property="og:image" content="https://raw.githubusercontent.com/haroldco45/guardiadigital/main/og-image.svg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://haroldco45.github.io/guardiadigital/">
    <meta property="og:type" content="website">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="🛡️ Guardia Digital - Seguridad del Barrio">
    <meta name="twitter:description" content="Reporta incidentes con fotos, videos y audio">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/haroldco45/guardiadigital/main/og-image.svg">
    
    <!-- PWA -->
    <link rel="manifest" href="data:application/json,{\"name\":\"Guardia Digital\",\"short_name\":\"Guardia\",\"start_url\":\"/\",\"display\":\"standalone\"}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <title>🛡️ Guardia Digital - Seguridad Comunitaria</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --azul-oscuro: #1e3a5f;
            --azul-medio: #2d5a8c;
            --rojo-alerta: #e74c3c;
            --naranja-aviso: #f39c12;
            --verde-seguro: #27ae60;
            --gris-claro: #ecf0f1;
            --blanco: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--blanco);
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, var(--azul-oscuro) 0%, var(--azul-medio) 100%);
            color: var(--blanco);
            padding: 15px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .status {
            font-size: 12px;
            padding: 5px 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
        }
        
        .status::before { content: '💾'; margin-right: 5px; }
        
        .tabs {
            display: flex;
            gap: 5px;
            padding: 10px;
            background: var(--gris-claro);
            overflow-x: auto;
            border-bottom: 1px solid #ddd;
        }
        
        .tab-btn {
            padding: 10px 15px;
            border: none;
            background: white;
            cursor: pointer;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: var(--azul-oscuro);
            color: white;
        }
        
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--azul-oscuro);
            font-size: 14px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--gris-claro);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--azul-medio);
            box-shadow: 0 0 0 3px rgba(45, 90, 140, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        button {
            background: linear-gradient(135deg, var(--azul-oscuro) 0%, var(--azul-medio) 100%);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            margin-bottom: 10px;
        }
        
        button.secondary { background: var(--naranja-aviso); }
        button.success { background: var(--verde-seguro); }
        
        .incident-card {
            background: var(--gris-claro);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid var(--azul-medio);
        }
        
        .media-preview {
            margin-top: 10px;
            border-radius: 8px;
            overflow: hidden;
            max-height: 200px;
            background: #000;
        }
        
        .media-preview img, 
        .media-preview video, 
        .media-preview audio {
            width: 100%;
            max-height: 200px;
        }
        
        .media-badge {
            display: inline-block;
            background: var(--verde-seguro);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 5px;
            margin-top: 5px;
        }
        
        .media-controls {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .media-controls button {
            flex: 1;
            min-width: 120px;
            margin-bottom: 0;
        }
        
        .recording {
            background: var(--rojo-alerta) !important;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.7; }
        }
        
        video#camaraPreview {
            width: 100%;
            border-radius: 8px;
            background: #000;
            margin-bottom: 10px;
        }
        
        .message {
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .footer {
            background: var(--gris-claro);
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #ddd;
        }
        
        .file-input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Guardia Digital</h1>
            <p style="font-size: 14px; margin: 0;">Con Multimedia 📸📹🎙️</p>
            <div class="status">Datos Locales</div>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
            <button class="tab-btn" onclick="switchTab('reportar')">📸 Reportar</button>
            <button class="tab-btn" onclick="switchTab('incidentes')">📋 Histórico</button>
            <button class="tab-btn" onclick="switchTab('backup')">💾 Backup</button>
        </div>
        
        <div class="content">
            <!-- Dashboard -->
            <div id="dashboard" class="tab-content active">
                <h2 style="color: var(--azul-oscuro); margin-bottom: 15px;">📊 Resumen del Barrio</h2>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
                    <div style="background: linear-gradient(135deg, var(--rojo-alerta), #c0392b); color: white; padding: 15px; border-radius: 8px; text-align: center;">
                        <div style="font-size: 28px; font-weight: bold;" id="totalIncidentes">0</div>
                        <small>Incidentes</small>
                    </div>
                    <div style="background: linear-gradient(135deg, var(--naranja-aviso), #d68910); color: white; padding: 15px; border-radius: 8px; text-align: center;">
                        <div style="font-size: 28px; font-weight: bold;" id="totalMultimedia">0</div>
                        <small>Con Media</small>
                    </div>
                </div>
                
                <div id="dashboardContent"></div>
            </div>
            
            <!-- Reportar -->
            <div id="reportar" class="tab-content">
                <h2 style="color: var(--azul-oscuro); margin-bottom: 15px;">📸 Reportar con Multimedia</h2>
                
                <div id="reportarMessage"></div>
                
                <form onsubmit="reportarIncidente(event)">
                    <div class="form-group">
                        <label>Tipo de Incidente *</label>
                        <select id="tipo" required>
                            <option value="">-- Selecciona --</option>
                            <option value="robo">🚗 Robo</option>
                            <option value="robo_residencia">🏠 Robo residencia</option>
                            <option value="sospechoso">👤 Sospechoso</option>
                            <option value="asalto">⚠️ Asalto</option>
                            <option value="accidente">🚗 Accidente</option>
                            <option value="otro">❓ Otro</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Descripción *</label>
                        <textarea id="descripcion" placeholder="Describe lo que viste..." required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Ubicación *</label>
                        <input type="text" id="ubicacion" placeholder="Calle..." required>
                    </div>
                    
                    <!-- MULTIMEDIA SECTION -->
                    <div class="form-group">
                        <label>📸 Multimedia (Opcional)</label>
                        <div class="media-controls">
                            <button type="button" class="secondary" onclick="abrirCamara()">📷 Foto</button>
                            <button type="button" class="secondary" onclick="grabarVideo()">🎥 Video</button>
                            <button type="button" class="secondary" onclick="grabarAudio()">🎙️ Audio</button>
                            <button type="button" class="secondary" onclick="document.getElementById('archivoMedia').click()">📁 Archivo</button>
                        </div>
                        <input type="file" id="archivoMedia" class="file-input" accept="image/*,video/*,audio/*" onchange="agregarMedia(event)">
                    </div>
                    
                    <!-- VIDEO PREVIEW CAMARA -->
                    <div id="camaraContainer" style="display:none;">
                        <video id="camaraPreview" autoplay playsinline></video>
                        <button type="button" class="success" onclick="capturarFoto()">📸 Capturar</button>
                        <button type="button" class="secondary" onclick="cerrarCamara()">❌ Cancelar</button>
                    </div>
                    
                    <!-- MEDIA PREVIEW -->
                    <div id="mediaPreview"></div>
                    
                    <button type="submit">📤 Enviar Reporte</button>
                </form>
            </div>
            
            <!-- Histórico -->
            <div id="incidentes" class="tab-content">
                <h2 style="color: var(--azul-oscuro); margin-bottom: 15px;">📋 Histórico</h2>
                <div id="incidentesContainer"></div>
            </div>
            
            <!-- Backup -->
            <div id="backup" class="tab-content">
                <h2 style="color: var(--azul-oscuro); margin-bottom: 15px;">💾 Backup</h2>
                
                <button class="success" onclick="descargarBackup()">📥 Descargar Backup</button>
                <button class="secondary" onclick="document.getElementById('archivoBackup').click()">📤 Restaurar Backup</button>
                <input type="file" id="archivoBackup" class="file-input" accept=".json" onchange="restaurarBackup(event)">
                
                <div id="backupMessage" style="margin-top: 15px;"></div>
            </div>
        </div>
        
        <div class="footer">
            Desarrollada por Vibras Positivas HM — Derechos de Autor Reservados
        </div>
    </div>
    
    <script>
        const DB_KEY = 'guardia_digital_reports';
        let mediaActual = null;
        let streamCamara = null;
        let grabadorVideo = null;
        let grabadorAudio = null;
        
        // ========== ALMACENAMIENTO ==========
        
        function guardarEnLocal(incidente) {
            let reportes = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
            reportes.push(incidente);
            localStorage.setItem(DB_KEY, JSON.stringify(reportes));
        }
        
        function cargarDelLocal() {
            return JSON.parse(localStorage.getItem(DB_KEY) || '[]');
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }
        
        // ========== CÁMARA ==========
        
        async function abrirCamara() {
            try {
                streamCamara = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' },
                    audio: false 
                });
                const video = document.getElementById('camaraPreview');
                video.srcObject = streamCamara;
                document.getElementById('camaraContainer').style.display = 'block';
            } catch (err) {
                alert('Error accediendo a la cámara: ' + err.message);
            }
        }
        
        function capturarFoto() {
            const video = document.getElementById('camaraPreview');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            mediaActual = canvas.toDataURL('image/jpeg', 0.8);
            mostrarMediaPreview(mediaActual, 'image/jpeg');
            cerrarCamara();
        }
        
        function cerrarCamara() {
            if (streamCamara) {
                streamCamara.getTracks().forEach(track => track.stop());
                streamCamara = null;
            }
            document.getElementById('camaraContainer').style.display = 'none';
        }
        
        // ========== VIDEO & AUDIO ==========
        
        async function grabarVideo() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, 
                    audio: true 
                });
                const video = document.getElementById('camaraPreview');
                video.srcObject = stream;
                document.getElementById('camaraContainer').style.display = 'block';
                
                const chunks = [];
                grabadorVideo = new MediaRecorder(stream);
                grabadorVideo.ondataavailable = e => chunks.push(e.data);
                grabadorVideo.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    const reader = new FileReader();
                    reader.onload = e => {
                        mediaActual = e.target.result;
                        mostrarMediaPreview(mediaActual, 'video/mp4');
                    };
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(t => t.stop());
                };
                
                grabadorVideo.start();
                const btn = event.target;
                btn.textContent = '⏹️ Detener Video';
                btn.onclick = () => {
                    grabadorVideo.stop();
                    btn.textContent = '🎥 Video';
                    cerrarCamara();
                };
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }
        
        async function grabarAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const chunks = [];
                grabadorAudio = new MediaRecorder(stream);
                grabadorAudio.ondataavailable = e => chunks.push(e.data);
                grabadorAudio.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/mp3' });
                    const reader = new FileReader();
                    reader.onload = e => {
                        mediaActual = e.target.result;
                        mostrarMediaPreview(mediaActual, 'audio/mp3');
                    };
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(t => t.stop());
                };
                
                grabadorAudio.start();
                const btn = event.target;
                btn.classList.add('recording');
                btn.textContent = '⏹️ Detener Audio';
                btn.onclick = () => {
                    grabadorAudio.stop();
                    btn.classList.remove('recording');
                    btn.textContent = '🎙️ Audio';
                };
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }
        
        // ========== PREVIEW & SUBMIT ==========
        
        function agregarMedia(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    mediaActual = e.target.result;
                    mostrarMediaPreview(mediaActual, file.type);
                };
                reader.readAsDataURL(file);
            }
            event.target.value = '';
        }
        
        function mostrarMediaPreview(data, tipo) {
            const preview = document.getElementById('mediaPreview');
            let html = '<div class="media-badge">✅ Media Adjunta</div>';
            
            if (tipo.startsWith('image/')) {
                html += `<div class="media-preview"><img src="${data}" alt="Foto"></div>`;
            } else if (tipo.startsWith('video/')) {
                html += `<div class="media-preview"><video controls src="${data}"></video></div>`;
            } else if (tipo.startsWith('audio/')) {
                html += `<div class="media-preview"><audio controls src="${data}"></audio></div>`;
            }
            
            preview.innerHTML = html;
        }
        
        function reportarIncidente(e) {
            e.preventDefault();
            
            const incidente = {
                uuid: Date.now().toString(),
                tipo: document.getElementById('tipo').value,
                descripcion: document.getElementById('descripcion').value,
                ubicacion: document.getElementById('ubicacion').value,
                fecha: new Date().toISOString().split('T')[0],
                hora: new Date().toTimeString().slice(0, 8),
                multimedia: mediaActual || null
            };
            
            guardarEnLocal(incidente);
            
            const msg = document.getElementById('reportarMessage');
            msg.innerHTML = '<div class="message success">✅ Reporte guardado</div>';
            document.querySelector('form').reset();
            document.getElementById('mediaPreview').innerHTML = '';
            mediaActual = null;
            actualizarDashboard();
            
            setTimeout(() => msg.innerHTML = '', 3000);
        }
        
        function actualizarDashboard() {
            const reportes = cargarDelLocal();
            const conMedia = reportes.filter(r => r.multimedia).length;
            
            document.getElementById('totalIncidentes').textContent = reportes.length;
            document.getElementById('totalMultimedia').textContent = conMedia;
            
            let html = '<h3>Últimos Reportes</h3>';
            reportes.slice(-5).reverse().forEach(inc => {
                html += `
                    <div class="incident-card">
                        <strong>${inc.tipo.toUpperCase()}</strong>
                        ${inc.multimedia ? '<div class="media-badge">📸 Con Media</div>' : ''}
                        <div>${inc.descripcion}</div>
                        <small>📍 ${inc.ubicacion} | 📅 ${inc.fecha}</small>
                    </div>
                `;
            });
            
            document.getElementById('dashboardContent').innerHTML = html;
        }
        
        function cargarIncidentes() {
            const container = document.getElementById('incidentesContainer');
            const reportes = cargarDelLocal();
            
            if (reportes.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#999">Sin reportes</p>';
                return;
            }
            
            let html = '';
            reportes.slice().reverse().forEach(inc => {
                html += `
                    <div class="incident-card">
                        <strong>${inc.tipo.toUpperCase()}</strong>
                        ${inc.multimedia ? '<div class="media-badge">📸 Con Media</div>' : ''}
                        <div>${inc.descripcion}</div>
                        <small>📍 ${inc.ubicacion} | 📅 ${inc.fecha} ${inc.hora}</small>
                `;
                
                if (inc.multimedia) {
                    const tipo = inc.multimedia.substring(5, 20);
                    if (tipo.includes('image')) {
                        html += `<div class="media-preview"><img src="${inc.multimedia}" style="max-width:100%;"></div>`;
                    } else if (tipo.includes('video')) {
                        html += `<div class="media-preview"><video controls src="${inc.multimedia}" style="max-width:100%;"></video></div>`;
                    } else if (tipo.includes('audio')) {
                        html += `<div class="media-preview"><audio controls src="${inc.multimedia}" style="max-width:100%;"></audio></div>`;
                    }
                }
                
                html += '</div>';
            });
            
            container.innerHTML = html;
        }
        
        function descargarBackup() {
            const reportes = cargarDelLocal();
            const backup = {
                fecha: new Date().toISOString(),
                total: reportes.length,
                datos: reportes
            };
            
            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `guardia-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            const msg = document.getElementById('backupMessage');
            msg.innerHTML = '<div class="message success">✅ Backup descargado</div>';
            setTimeout(() => msg.innerHTML = '', 3000);
        }
        
        function restaurarBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const backup = JSON.parse(e.target.result);
                    localStorage.setItem(DB_KEY, JSON.stringify(backup.datos));
                    
                    const msg = document.getElementById('backupMessage');
                    msg.innerHTML = `<div class="message success">✅ ${backup.datos.length} reportes restaurados</div>`;
                    actualizarDashboard();
                    setTimeout(() => msg.innerHTML = '', 3000);
                } catch (err) {
                    const msg = document.getElementById('backupMessage');
                    msg.innerHTML = '<div class="message error">❌ Error: archivo inválido</div>';
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }
        
        window.addEventListener('load', () => {
            console.log('[Guardia] 🚀 v3.0 - Con Multimedia');
            actualizarDashboard();
            document.getElementById('incidentes').addEventListener('click', cargarIncidentes);
        });
    </script>
</body>
</html>
